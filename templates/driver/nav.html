<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<nav class="fixed top-0 z-50 w-full bg-white border-b border-gray-200 shadow-sm dark:bg-gray-900 dark:border-gray-700">

  <div class="px-4 py-3 lg:px-6">
    <div class="flex items-center justify-between">

      <!-- LEFT -->
      <div class="flex items-center gap-4">

       <button id="sidebarToggle"
    class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
    <i class="fa-solid fa-bars text-gray-600 dark:text-gray-300"></i>
</button>
       

      </div>

      <!-- RIGHT -->
      <div class="flex items-center gap-4">

        <!-- MESSAGE -->
        <button class="relative w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
          <i class="fa-regular fa-message text-gray-600 dark:text-gray-300"></i>
          <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>

        <!-- NOTIFICATION -->
        <button class="relative w-10 h-10 flex items-center justify-center rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">
          <i class="fa-regular fa-bell text-gray-600 dark:text-gray-300"></i>
          <span class="absolute top-2 right-2 w-2 h-2 bg-blue-500 rounded-full"></span>
        </button>

        <!-- PROFILE DROPDOWN -->
        <div class="relative">

          <!-- BUTTON -->
          <button id="userDropdownBtn"
            class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800">

            <!-- FONT AWESOME USER ICON (NO IMAGE) -->
            <div class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-200 dark:bg-gray-700">
              <i class="fa-solid fa-user text-gray-600 dark:text-gray-300"></i>
            </div>

            <!-- USER INFO -->
            <div class="hidden md:block text-left">
              <h2 class="text-sm font-semibold text-gray-800 dark:text-white">
                {{ request.user.first_name }} {{ request.user.last_name }}
              </h2>
              <p class="text-xs text-gray-500 dark:text-gray-400">
                {{ request.user.email }}
              </p>
            </div>

            <i class="fa-solid fa-chevron-down text-xs text-gray-500"></i>

          </button>

          <!-- DROPDOWN -->
          <div id="userDropdown"
               class="hidden absolute right-0 mt-3 w-56 bg-white rounded-xl shadow-xl border z-50
                      dark:bg-gray-800 dark:border-gray-700">

            <!-- HEADER -->
            <div class="px-4 py-3 border-b dark:border-gray-700">
              <h3 class="text-sm font-semibold text-gray-800 dark:text-white">
                {{ request.user.first_name }} {{ request.user.last_name }}
              </h3>
              <p class="text-xs text-gray-500 dark:text-gray-400">
                {{ request.user.email }}
              </p>
            </div>

            <!-- MENU -->
            <ul class="py-2">

              <li>
                <a href="{%url 'driver_profile' %}"
                   class="flex items-center gap-3 px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">
                  <i class="fa-regular fa-user"></i>
                  My Profile
                </a>
              </li>

              <li>
                <a href="{%url 'change_password' %}"
                   class="flex items-center gap-3 px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-700">
                  <i class="fa-solid fa-gear"></i>
                  Change password
                </a>
              </li>

              <li>
                <a href="{% url 'logout' %}"
                   class="flex items-center gap-3 px-4 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20">
                  <i class="fa-solid fa-right-from-bracket"></i>
                  Logout
                </a>
              </li>

            </ul>

          </div>

        </div>

      </div>

    </div>
  </div>
</nav>

<script>
  const btn = document.getElementById("userDropdownBtn");
  const menu = document.getElementById("userDropdown");

  btn.addEventListener("click", function (e) {
    e.stopPropagation();
    menu.classList.toggle("hidden");
  });

  document.addEventListener("click", function () {
    menu.classList.add("hidden");
  });
</script>
